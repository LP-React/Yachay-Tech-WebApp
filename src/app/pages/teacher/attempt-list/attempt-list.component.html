<h2 class="mb-4">Panel docente</h2>

<div class="card shadow-sm mb-4">
  <div class="card-body">
    <form [formGroup]="form" (ngSubmit)="search()">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label">Buscar por</label>
          <select class="form-select" formControlName="mode">
            <option value="course">Curso</option>
            <option value="simulation">Simulación</option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label">ID</label>
          <input type="number" class="form-control" formControlName="id">
        </div>

        <div class="col-md-4">
          <button class="btn btn-dark w-100" [disabled]="form.invalid">
            Buscar
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="alert alert-danger" *ngIf="error">
  {{ error }}
</div>

<div class="table-responsive" *ngIf="attempts.length > 0">
  <table class="table table-bordered table-hover align-middle">
    <thead class="table-dark">
      <tr>
        <th>Intento</th>
        <th>Estudiante</th>
        <th>Simulación</th>
        <th>Estado</th>
        <th>Puntaje</th>
        <th>Resultado</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of attempts">
        <td>{{ item.attemptId }}</td>
        <td>{{ item.studentFullName }}</td>
        <td>{{ item.simulationTitle }}</td>
        <td>{{ item.status }}</td>
        <td>{{ item.totalScore }}</td>
        <td>{{ item.finalResultTitle }}</td>
        <td>
          <a class="btn btn-sm btn-outline-dark" [routerLink]="['/teacher/attempts', item.attemptId]">
            Ver detalle
          </a>
        </td>
      </tr>
    </tbody>
  </table>
</div>
